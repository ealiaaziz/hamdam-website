      - /url: "#ceremony"
  - figure "Hafez":
    - blockquote:
      - paragraph: غنچه گو تنگ‌دل از کارِ فروبسته مَباش کز دَمِ صبح مدد یابی و انفاسِ نسیم
    - paragraph: "Tell the bud: do not be small-hearted at what remains closed — for from the morning's breath you will find help, and from the breeze's sigh."
    - text: Hafez
  - figure "Rumi":
    - blockquote:
      - paragraph: گرچه خزان کرد جفاها بسی بین که بهاران چه وفا می‌کند
    - paragraph: Though autumn committed many cruelties — see what faithfulness spring brings.
    - text: Rumi
  - figure "Parvin":
    - blockquote:
      - paragraph: گنجشک خرد گفت سحر با کبوتری کآخر تو هم برون کن ازین آشیان سری آفاق روشن است، چه خسبی به تیرگی روزی بپر، ببین چمن و جوئی و جری
    - paragraph: "A small sparrow said at dawn to a pigeon: won't you too lift your head from this nest? / The horizons are bright — why do you sleep in darkness? Fly a day, go see the meadow, the stream, the brook."
    - text: Parvin
  - paragraph: A verse for every morning. Five poets. Two languages. Centuries of wisdom.
  - heading "A companion for the daily reflection." [level=2]
  - paragraph: "Every day, Hamdam meets you at the hour it finds you: a morning that opens gently, an afternoon that steadies, an evening that settles. Tell it how your heart feels with a simple slider, and it offers a verse and a reflection chosen for that feeling."
  - paragraph: Every verse arrives in its original Persian beside a careful English translation, drawn from Hafez, Rumi, Saadi, Khayyam and Parvin Etesami.
  - paragraph: A gentle streak keeps count, forgiving a missed day. Every reflection is kept in a private journal, searchable from your Home Screen, with your favourites always at hand.
  - region "Five poets, five voices.":
    - heading "Five poets, five voices." [level=2]
    - region "The five poets":
      - img "Portrait of Hafez (artistic interpretation)"
      - heading "حافظ" [level=3]
      - paragraph: Hafez
      - paragraph: The tavern of the seeker. Where wine and mirror share the same table.
      - img "Portrait of Rumi (artistic interpretation)"
      - heading "مولانا" [level=3]
      - paragraph: Rumi
      - paragraph: The reed's song. Longing as its own kind of arrival.
      - img "Portrait of Saadi (artistic interpretation)"
      - heading "سعدی" [level=3]
      - paragraph: Saadi
      - paragraph: The garden and the road. Wisdom, gently offered.
      - img "Portrait of Khayyam (artistic interpretation)"
      - heading "خیام" [level=3]
      - paragraph: Khayyam
      - paragraph: The rose and the wine cup. What is here is what there is.
      - img "Portrait of Parvin (artistic interpretation)"
      - heading "پروین" [level=3]
      - paragraph: Parvin
      - paragraph: "Small things speak. The needle, the ant, the mirror: all with lessons."
    - paragraph: Verses sourced from Ganjoor.net. Portraits are artistic interpretations.
