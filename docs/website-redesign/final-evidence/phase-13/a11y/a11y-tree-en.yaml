  - region "Yalda, Norooz, Chaharshanbe Suri. Hamdam knows when they arrive, and greets them with poetry that belongs to them.":
    - heading "Yalda, Norooz, Chaharshanbe Suri. Hamdam knows when they arrive, and greets them with poetry that belongs to them." [level=2]
    - list:
      - listitem:
        - img "Pomegranates and candlelight for Yalda night"
        - text: یلدا
        - paragraph: Yalda
        - paragraph: The longest night of the year, when families gather to read Hafez, share pomegranates and watermelon, and welcome the return of the sun.
        - paragraph: Yalda arrives in 156 days.
      - listitem:
        - img "Fire glow at dusk for Chaharshanbe Suri"
        - text: چهارشنبه‌سوری
        - paragraph: Chaharshanbe Suri
        - paragraph: The last Tuesday night before Norooz, when people leap over small fires whispering 'give me your redness, take my paleness.'
        - paragraph: Chaharshanbe Suri arrives in 241 days.
      - listitem:
        - img "Spring blossoms in morning light for Norooz"
        - text: نوروز
        - paragraph: Norooz
        - paragraph: The first day of spring, marking renewal, rebirth, and the balance of light and dark.
        - paragraph: Norooz arrives in 245 days.
    - paragraph: Mehregan and Sizdah Bedar are marked too, each with its own quiet arrival.
    - paragraph: Ask, as generations have.
    - img "Hamdam Roots screen with Fal-e Hafez and the cultural calendar (final screenshot pending)"
  - heading "Hamdam meets you wherever you look." [level=2]
  - paragraph: Ask Siri to start a reflection, hear today's verse, or check your streak. Add a widget to your Home Screen. If you wear an Apple Watch, your verse and streak travel with you. If you choose, each reflection can be saved to Apple Health as a State of Mind entry, with calm music playing alongside through Apple Music.
  - text: Siri Widgets Watch Health Music
  - region "Hamdam does not use accounts. It does not collect emails. Your words never leave your device unless you turn on your own iCloud sync. Nobody at Hamdam can read a word you write.":
    - paragraph: Hamdam does not use accounts. It does not collect emails. Your words never leave your device unless you turn on your own iCloud sync. Nobody at Hamdam can read a word you write.
    - list:
      - listitem: No accounts No sign-up, no email at all.
      - listitem: On your device Signals stay where they were read.
      - listitem: Your own iCloud only Sync is opt-in, scoped to your Apple ID.
