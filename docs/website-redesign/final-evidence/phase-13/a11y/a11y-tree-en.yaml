  - region "Tell Hamdam how your heart feels. It answers with a verse.":
    - heading "Tell Hamdam how your heart feels. It answers with a verse." [level=2]
    - paragraph: گرچه خزان کرد جفاها بسی بین که بهاران چه وفا می‌کند
    - paragraph: Though autumn committed many cruelties — see what faithfulness spring brings.
    - paragraph: Rumi
    - slider "How your heart feels today": "2"
    - paragraph: This is how the app works. In Hamdam, your reflection follows.
