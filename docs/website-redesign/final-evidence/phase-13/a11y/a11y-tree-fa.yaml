    - heading "به همدم بگو دلت چه‌طور است تا با شعری پاسخ دهد." [level=2]
    - paragraph: گرچه خزان کرد جفاها بسی بین که بهاران چه وفا می‌کند
    - paragraph: Though autumn committed many cruelties — see what faithfulness spring brings.
    - paragraph: مولانا
    - slider "دلت امروز چطور است": "2"
    - paragraph: اپلیکیشن همدم همین‌گونه کار می‌کند؛ در همدم، تأمل تو از همان‌جا ادامه پیدا می‌کند.
    - link "چیزهای بیشتری در اپلیکیشن منتظرت است.":
      - /url: "#ceremony"
  - figure "حافظ":
    - blockquote:
      - paragraph: غنچه گو تنگ‌دل از کارِ فروبسته مَباش کز دَمِ صبح مدد یابی و انفاسِ نسیم
    - paragraph: "Tell the bud: do not be small-hearted at what remains closed — for from the morning's breath you will find help, and from the breeze's sigh."
    - text: حافظ
  - figure "مولانا":
    - blockquote:
      - paragraph: گرچه خزان کرد جفاها بسی بین که بهاران چه وفا می‌کند
    - paragraph: Though autumn committed many cruelties — see what faithfulness spring brings.
    - text: مولانا
  - figure "پروین":
    - blockquote:
      - paragraph: گنجشک خرد گفت سحر با کبوتری کآخر تو هم برون کن ازین آشیان سری آفاق روشن است، چه خسبی به تیرگی روزی بپر، ببین چمن و جوئی و جری
    - paragraph: "A small sparrow said at dawn to a pigeon: won't you too lift your head from this nest? / The horizons are bright — why do you sleep in darkness? Fly a day, go see the meadow, the stream, the brook."
    - text: پروین
  - paragraph: شعری برای هر صبح. پنج شاعر. دو زبان. قرن‌ها خرد.
  - heading "همدمی برای تأمل روزانه." [level=2]
  - paragraph: همدم هر روز، در همان ساعتی که به سراغت می‌آید، همراهت می‌شود؛ صبحی که به‌آرامی باز می‌شود، عصری که آرام می‌کند، شبی که روز را به آرامش می‌رساند. حال دلت را با یک حرکت ساده بگو، همدم شعر و تأملی متناسب با آن حس برایت می‌آورد.
  - paragraph: هر شعر با متن اصلی پارسی در کنار برگردان انگلیسی می‌آید، از حافظ، مولانا، سعدی، خیام و پروین اعتصامی.
  - paragraph: روزشماری آرام همراهی می‌کند که یک روز از قلم‌افتاده را می‌بخشد. هر تأمل در یادداشتی خصوصی نگه داشته می‌شود که از صفحه‌ی اصلی گوشی قابل جست‌وجوست، و شعرهای محبوبت همیشه در دسترس‌اند.
  - region "پنج شاعر، پنج صدا.":
    - heading "پنج شاعر، پنج صدا." [level=2]
    - region "پنج شاعر":
      - img "پرتره حافظ (برداشت هنری)"
      - heading "حافظ" [level=3]
      - paragraph: Hafez
      - paragraph: میخانه‌ی جوینده. جایی که می و آینه بر یک سفره‌اند.
      - img "پرتره مولانا (برداشت هنری)"
      - heading "مولانا" [level=3]
      - paragraph: Rumi
      - paragraph: نوای نی. اشتیاق، خود گونه‌ای از رسیدن است.
      - img "پرتره سعدی (برداشت هنری)"
      - heading "سعدی" [level=3]
      - paragraph: Saadi
      - paragraph: باغ و جاده. حکمتی که به‌آرامی هدیه می‌شود.
      - img "پرتره خیام (برداشت هنری)"
      - heading "خیام" [level=3]
      - paragraph: Khayyam
      - paragraph: گل و جام می. آنچه هست، همین است که هست.
      - img "پرتره پروین (برداشت هنری)"
      - heading "پروین" [level=3]
      - paragraph: Parvin
      - paragraph: چیزهای کوچک سخن می‌گویند. سوزن، مورچه، آینه؛ همه با درسی.
    - paragraph: شعرها از گنجور گردآوری شده‌اند. پرتره‌ها برداشت‌های هنری هستند.
  - region "یک تأمل، شکل‌گرفته از روز تو.":
    - heading "یک تأمل، شکل‌گرفته از روز تو." [level=2]
    - img "پیش‌نمایش صفحه اصلی همدم (تصویر نهایی در دست تهیه)"
    - list:
      - listitem: حال و هوا فقط اگر خودت ثبت کنی؛ اثرش در لحن است، نه در امتیاز.
      - listitem: آب‌وهوا از طریق WeatherKit اپل، روی همان دستگاه تو.
      - listitem: فصل بر اساس موقعیت و فصل سال.
      - listitem: ساعت روز صبح، ظهر، عصر، شب.
      - listitem: تقویم فقط مناسبت‌های فرهنگی، هرگز جزئیات رویدادها.
      - listitem: سلامت فقط اگر خودت بخواهی، فقط روی همان دستگاه.
    - link "ببین چطور خصوصی می‌ماند":
      - /url: "#privacy"
  - region "هر تأمل، برای تو نگه داشته می‌شود.":
    - heading "هر تأمل، برای تو نگه داشته می‌شود." [level=2]
    - paragraph: "در طول هفته‌ها، همدم آب‌وهوای خودت را به تو نشان می‌دهد: خلق‌وخوی تو، فصل‌های تو، مسیر تو. دفتر خصوصی، نشان‌شده‌ها، و رگه‌ای ملایم که یک روز از قلم افتاده را می‌بخشد."
    - button "صفحه تأملات همدم با دفتر خصوصی و نشان‌شده‌ها (تصویر نهایی در دست تهیه)"
    - button "صفحه سفر شما در همدم با نمودار روند خلق‌وخو (تصویر نهایی در دست تهیه)"
    - paragraph: همدم منتظر آشنایی با توست.
