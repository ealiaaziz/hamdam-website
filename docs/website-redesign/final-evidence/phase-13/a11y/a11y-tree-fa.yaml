  - region "آیین روزانه همیشه رایگان است.":
    - heading "آیین روزانه همیشه رایگان است." [level=2]
    - heading "رایگان" [level=3]
    - paragraph: آیین روزانه همیشه رایگان است، از جمله پانزده تأمل در هر ماه.
    - heading "همدم پلاس" [level=3]
    - paragraph: همدم پلاس تأملات نامحدود، کتابخانه کامل خرد پنج شاعر، و بایگانی تأملات را باز می‌کند، و بیشتر.
    - paragraph: ماهانه یا سالانه، با هفت روز آزمایش رایگان برای مشترکان جدید.
    - paragraph: قیمت در اپ‌استور نمایش داده می‌شود.
    - heading "همراه بنیان‌گذار" [level=3]
    - paragraph: یک خرید، برای همیشه مال توست، قابل اشتراک‌گذاری با خانواده‌ات از طریق Apple Family Sharing.
    - paragraph: قیمت در اپ‌استور نمایش داده می‌شود.
