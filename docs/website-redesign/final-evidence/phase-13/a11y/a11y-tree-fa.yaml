  - region "یلدا، نوروز، چهارشنبه‌سوری. همدم می‌داند کِی از راه می‌رسند، و آن‌ها را با شعری که به خودشان تعلق دارد خوش‌آمد می‌گوید.":
    - heading "یلدا، نوروز، چهارشنبه‌سوری. همدم می‌داند کِی از راه می‌رسند، و آن‌ها را با شعری که به خودشان تعلق دارد خوش‌آمد می‌گوید." [level=2]
    - list:
      - listitem:
        - img "انار و شمع برای شب یلدا"
        - text: یلدا
        - paragraph: Yalda
        - paragraph: طولانی‌ترین شب سال، وقتی خانواده‌ها دور هم جمع می‌شوند تا حافظ بخوانند، انار و هندوانه به اشتراک بگذارند، و بازگشت خورشید را خوش‌آمد بگویند.
        - paragraph: یلدا تا ۱۵۶ روز دیگر می‌رسد.
      - listitem:
        - img "شعله‌ی آتش در غروب برای چهارشنبه‌سوری"
        - text: چهارشنبه‌سوری
        - paragraph: Chaharshanbe Suri
        - paragraph: شب سه‌شنبه‌ی آخر پیش از نوروز، وقتی مردم از روی آتش‌های کوچک می‌پرند و زمزمه می‌کنند «سرخی تو از من، زردی من از تو».
        - paragraph: چهارشنبه‌سوری تا ۲۴۱ روز دیگر می‌رسد.
      - listitem:
        - img "شکوفه‌های بهاری در نور صبح برای نوروز"
        - text: نوروز
        - paragraph: Norooz
        - paragraph: نخستین روز بهار، نشانه‌ی تجدید، تولدی دوباره، و توازن روشنایی و تاریکی.
        - paragraph: نوروز تا ۲۴۵ روز دیگر می‌رسد.
    - paragraph: مهرگان و سیزده بدر هم علامت‌گذاری شده‌اند، هرکدام با آمدنی آرام.
    - paragraph: همان‌گونه که نسل‌ها پرسیده‌اند، بپرس.
