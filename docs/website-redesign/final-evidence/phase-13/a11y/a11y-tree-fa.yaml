  - heading "همدم هر جا که نگاه کنی، همراه توست." [level=2]
  - paragraph: از سیری بخواه تأملی را آغاز کند، شعر امروز را بشنود، یا روزشمارت را بررسی کند. ابزارکی به صفحه‌ی اصلی اضافه کن. اگر اپل واچ داری، شعر و روزشمارت همراهت سفر می‌کنند. اگر بخواهی، هر تأمل می‌تواند به‌عنوان یک ثبت حالت ذهنی در اپل هلث ذخیره شود، همراه با موسیقی آرام از اپل موزیک.
  - text: سیری ابزارک اپل واچ اپل هلث اپل موزیک
  - region "همدم از حساب کاربری استفاده نمی‌کند. ایمیلی جمع‌آوری نمی‌کند. کلمات تو هرگز از دستگاهت خارج نمی‌شوند، مگر اینکه خودت همگام‌سازی iCloud را روشن کنی. هیچ‌کس در همدم نمی‌تواند حتی یک کلمه از نوشته‌های تو را بخواند.":
    - paragraph: همدم از حساب کاربری استفاده نمی‌کند. ایمیلی جمع‌آوری نمی‌کند. کلمات تو هرگز از دستگاهت خارج نمی‌شوند، مگر اینکه خودت همگام‌سازی iCloud را روشن کنی. هیچ‌کس در همدم نمی‌تواند حتی یک کلمه از نوشته‌های تو را بخواند.
    - list:
      - listitem: بدون حساب کاربری بدون ثبت‌نام، بدون ایمیل.
      - listitem: روی دستگاه خودت سیگنال‌ها همان‌جا که خوانده شدند می‌مانند.
      - listitem: فقط iCloud خودت همگام‌سازی اختیاری است، فقط برای Apple ID خودت.
